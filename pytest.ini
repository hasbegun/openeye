[pytest]
testpaths = shared/tests services/gateway/tests services/guardrails/tests services/analyzer/tests services/ingestor/tests services/alerter/tests
pythonpath = .
asyncio_mode = auto
addopts = --import-mode=importlib -p no:cacheprovider
filterwarnings =
    ignore::pydantic.warnings.PydanticDeprecatedSince20
    ignore:'imghdr' is deprecated:DeprecationWarning
