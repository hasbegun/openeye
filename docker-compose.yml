services:
  # --- Infrastructure ---
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openeye
      POSTGRES_PASSWORD: openeye_dev
      POSTGRES_DB: openeye
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openeye"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Application Services ---
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  guardrails:
    build:
      context: .
      dockerfile: services/guardrails/Dockerfile
    env_file: .env
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  analyzer:
    build:
      context: .
      dockerfile: services/analyzer/Dockerfile
    env_file: .env
    depends_on:
      nats:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ingestor:
    build:
      context: .
      dockerfile: services/ingestor/Dockerfile
    env_file: .env
    depends_on:
      nats:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  alerter:
    build:
      context: .
      dockerfile: services/alerter/Dockerfile
    env_file: .env
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - gateway

  # --- Init containers ---
  nats-init:
    image: natsio/nats-box:latest
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - ./scripts/init-nats.sh:/init-nats.sh:ro
    entrypoint: ["/bin/sh", "/init-nats.sh"]
    restart: "no"

volumes:
  nats_data:
  postgres_data:
